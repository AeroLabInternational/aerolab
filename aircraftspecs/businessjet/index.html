    <div class="general-heading">
        <div class="general-heading-inner">
            <p>ビジネスジェットは、少人数のグループを快適でスタイリッシュに輸送するために設計された航空機です。地域旅行に最適な軽量ジェットから、大陸間飛行が可能な超長距離機まで様々です。ビジネスジェットは、柔軟性、プライバシー、時間の節約、商用航空会社では利用できない小規模空港へのアクセスを提供します。</p>
        </div>
    </div>

                    </button>

    <script>
        function toggleCategory(categoryId) {
            const content = document.getElementById(categoryId);
            const button = content.previousElementSibling;
            const icon = button.querySelector('.toggle-icon');
            
            if (content.style.display === 'none' || content.style.display === '') {
                content.style.display = 'block';
                icon.classList.add('rotated');
            } else {
                content.style.display = 'none';
                icon.classList.remove('rotated');
            }
        }
    </script>

        const container = document.querySelector('.specs-search-section .global-inner:last-of-type');
        container.innerHTML = '';

        const pagePaths = {
            "Gulfstream G550": "/aircraftspecs/businessjet/gulfstream/G550/",
            // add more mappings as new detail pages are created
        };

        const brands = {
            "HondaJet": [
                "HondaJet HA-420",
                "HondaJet Elite",
                "HondaJet Elite S",
                "HondaJet Elite II"
            ],
            "Cessna": [

                "Cessna Citation CJ1 Series",
                "Cessna Citation CJ2 Series",
                "Cessna Citation CJ3 Series",
                "Cessna Citation CJ4 Series",
                "Cessna Citation Sovereign",
                "Cessna Citation Latitude",
                "Cessna Citation X",
                "Cessna Citation Longitude"
            ],
            "Gulfstream": [
                "Gulfstream G150",
                "Gulfstream G200",
                "Gulfstream G280",
                "Gulfstream G300",
                "Gulfstream G350",
                "Gulfstream G400",
                "Gulfstream G450",
                "Gulfstream G500",
                "Gulfstream G550",
                "Gulfstream G600",
                "Gulfstream G650",
                "Gulfstream G650ER"
            ]
        };

        Object.entries(brands).forEach(([brand, models]) => {
            const section = document.createElement('div');
            section.className = 'category-section';
            section.innerHTML = `
                <button class="category-toggle" onclick="toggleCategory('${brand.toLowerCase()}')">
                    <span class="toggle-icon">▼</span>
                    <h2 style="display:inline;margin:0;">${brand}</h2>
                </button>
                <div id="${brand.toLowerCase()}" class="category-content" style="display:none;">
                    <div class="aircraft-grid"></div>
                </div>
            `;

            const grid = section.querySelector('.aircraft-grid');
            models.forEach(name => {
                const card = pagePaths[name] ? document.createElement('a') : document.createElement('div');
                if (pagePaths[name]) {
                    card.href = pagePaths[name];
                    card.className = 'aircraft-card available';
                } else {
                    card.className = 'aircraft-card unavailable';
                }

                const img = document.createElement('div');
                img.className = 'aircraft-card-image';
                if (name === 'Gulfstream G550') {
                    img.style.backgroundImage = "url('/assets/aircraftspecs/aircrafts/gulfstream/Gulfstream-G550-Background.png')";
                    img.style.backgroundSize = 'cover';
                    img.style.backgroundPosition = 'center';
                } else {
                    img.textContent = '✈️';
                }

                const content = document.createElement('div');
                content.className = 'aircraft-card-content';

                const h3 = document.createElement('h3');
                h3.className = 'aircraft-card-name';
                h3.textContent = name;

                const specsDiv = document.createElement('div');
                specsDiv.className = 'aircraft-card-specs';

                [['航続距離', 'Range'], ['最大速度', 'Speed'], ['乗客数', 'Pax']].forEach(([jpLabel]) => {
                    if (!specs[name] || !specs[name][jpLabel]) return;
                    const spec = document.createElement('div');
                    spec.className = 'aircraft-card-spec';
                    spec.innerHTML = `<span class="aircraft-card-spec-label">${jpLabel}</span><span class="aircraft-card-spec-value">${specs[name][jpLabel]}</span>`;
                    specsDiv.append(spec);
                });

                content.append(h3, specsDiv);
                card.append(img, content);
                grid.append(card);
            });

            container.appendChild(section);
        });
